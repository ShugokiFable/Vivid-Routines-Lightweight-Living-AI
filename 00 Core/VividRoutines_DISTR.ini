; ========================== 8) CHILDREN ======================================
; Children keep their good vanilla AI (play by day, home at night), so this mod
; mostly LEAVES THEM ALONE: the -C trait on every adult routine/keyword above
; excludes children from all sandbox/travel/wanderlust behavior.
;
; Regular inns are FINE for kids - they are eat-and-sleep places, not just bars
; (Mila & Carlotta even discuss going to the Bannered Mare to eat), and urchins
; canonically sleep in/near them. So this mod does NOT block children from
; regular inns; a child who already lives in or visits an inn via their own
; vanilla AI keeps doing so, untouched - that is the "lore exception". The ONLY
; hard block is the three ADULT nightlife venues (The Naked Dragon, The Nasty
; Pine, The Rift's Rest): -C on their keyword AND packages + a runtime
; IsChild==0 = a guaranteed 0% chance a child ever walks in.
;
; On top of vanilla, kids get a natural extra: a daytime habit of popping into
; their OWN city's regular inn to eat / look for someone (routed to the child's
; current city by GetInCurrentLoc, gated by the "Children" MCM toggle, never a
; nightlife venue). Two rates, split by a whitelist:
;
;   * NAMED INN-CHILDREN -> 70% (they canonically belong at inns): Mila Valentia
;     (0x013BAD, discusses eating at the Bannered Mare) and the homeless street
;     urchins Lucia / Sofie / Alesan / Blaise (all editorID BYOHUrchin_*, caught
;     by *urchin), PLUS any MODDED urchin/street kids (*urchin, *streetkid).
;     The C trait keeps this to children, so non-child "urchin" NPCs are ignored.
;   * EVERY OTHER CHILD  -> 15% (the general "sometimes eats at the inn" habit),
;     with the whitelist excluded so named kids use only their 70% line.
;
; Whitelisted urchins who already SLEEP in/near an inn keep that via their own
; vanilla AI - this mod never touches a child's sleep. Tune the two numbers (70
; and 15) to taste. Add your own kids by dropping their FormID into the keyword
; line, e.g. ...,0xID~YourMod.esp.
Keyword = VRAI_InnChild|*urchin,*streetkid,-*slave,-*captive|-VRAI_Excluded|NONE|C|NONE|100
Keyword = VRAI_InnChild|-*slave,-*captive|0x013BAD~Skyrim.esm,-VRAI_Excluded|NONE|C|NONE|100

