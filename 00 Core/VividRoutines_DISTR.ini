; ========================== 0) QUEST-CRITICAL BLACKLIST ======================
; v2.10: NPCs holding the VRAI_Excluded keyword are IGNORED by every single
; Vivid Routines distribution below (-VRAI_Excluded on every line). There is no
; engine condition for "actor is currently reserved by a quest", and scene
; STAGING happens via base AI before scene guards can protect anyone - so
; quest-critical people are excluded by name, permanently.
; Defaults (verified editorIDs, Skyrim.esm):
;   Roggvir + Ahtar + CaptainAldis + Rorlund  - Solitude execution ceremony
;   MS01Margret + MS01Weylin                  - Markarth assassination intro
;   IdolafBattleBorn + AdrianneAvenicci       - Whiterun "Battle-Born vs
;     Gray-Mane" doorstep scene. NOTE: this removes Adrianne from the Mare
;     Regulars evening vignette - delete her from the line below to trade the
;     scene protection back for the flavor.
;   dunDarklightIllia                         - Illia must follow you up
;     Darklight Tower (her quest-follow runs on her base actor, which our
;     idx-0 packages can outrank).
; USERS: add anyone by editorID (or exact display name) to the line below, or
; ship your own ini next to this one containing a single line like:
;   Keyword = VRAI_Excluded|MyPreciousNpcEditorID|NONE|NONE|NONE|NONE|100
Keyword = VRAI_Excluded|Roggvir,Ahtar,CaptainAldis,Rorlund,MS01Margret,MS01Weylin,IdolafBattleBorn,AdrianneAvenicci,dunDarklightIllia,Uthgerd,SkulvarSableHilt|NONE|NONE|NONE|NONE|100

; =============================================================================
;  Vivid Routines - Lightweight Living AI  (v1.1)
;  SPID distribution rules (Spell Perk Item Distributor 7.x)
; =============================================================================
;  Design notes:
;  - All behavior = native AI packages + conditioned constant-effect abilities,
;    distributed at load by SPID. The only script in this mod is the MCM anchor.
;  - Every feature is gated at RUNTIME by a GlobalVariable that the MCM edits,
;    so toggling in the MCM takes effect immediately, mid-save, no console.
;  - Lines that reference a plugin you do not have are skipped silently by
;    SPID. Removing an optional VividRoutines module ESP is always safe.
;  - Package index field: 0 = top of the NPC's AI stack (overrides their
;    normal AI while valid), 99 = appended at the BOTTOM (pure fallback that
;    only runs when the NPC has no other valid package).
; =============================================================================


; =============================================================================
; PRISONER / JAIL SAFETY (two independent layers, v1.1)
; -----------------------------------------------------------------------------
; LAYER 1 - runtime, location-based (the real guarantee, baked into the ESP):
;   EVERY package in VividRoutines.esp carries the engine condition
;     GetKeywordDataForCurrentLocation(LocTypeJail) == 0
;   so the moment an actor is inside ANY jail-type location, all of this mod's
;   packages evaluate false and the actor falls back to their own vanilla AI -
;   they stay in their cell. This catches ANY npc in a prison cell regardless
;   of faction or source mod, and self-corrects: free a captive and walk them
;   out of the jail location and they rejoin normal life automatically. This is
;   what covers "nobody in a prison cell walks out", including not-yet-recruited
;   follower captives.
;
; LAYER 2 - distribution-time, actor-based (belt & suspenders, the lines below):
;   Every package filter also EXCLUDES the prisoner keyword + faction
;     ,-dunPrisonerFaction,-ActorTypePrisoner
;   so flagged prisoners never even receive the packages - useful for modded
;   jails that lack a LocTypeJail location for Layer 1 to detect.
; =============================================================================
; SCENE / QUEST / FOLLOWER SAFETY (baked into every package as engine conditions)
; -----------------------------------------------------------------------------
; The mod must NEVER hijack an NPC who is busy. Every package carries:
;   GetPlayerTeammate == 0        -> stands down the instant the NPC is actually
;                                    recruited (rank-correct; unlike a faction
;                                    check it does NOT freeze pre-listed
;                                    potential followers like Yuria/Uthgerd who
;                                    sit in CurrentFollowerFaction at rank -1).
;   IsInScene == 0                -> stands down during ANY scripted scene, so
;                                    conversations like Uthgerd <-> Skulvar are
;                                    never interrupted (vanilla OR modded).
;   IsInDialogueWithPlayer == 0   -> never yanks an NPC mid-dialogue with you.
;   IsInScene == 0 / IsScenePackageRunning == 0 -> stands down for any actor in
;                                    a scene OR staging via a scene package, so
;                                    first-visit set-pieces (Markarth attack,
;                                    Solitude execution) are never disrupted;
;                                    those principals are also name-excluded from
;                                    the weather/meal systems as belt-and-braces.
;   GetKeywordDataForCurrentLocation(LocTypeJail) == 0  -> jail safety (below).
; Quest/scene FORCED packages (from aliases) already outrank template packages,
; so those are safe by construction; these conditions cover the rest.
; NPC targeting: only ActorTypeNPC humanoids + follower factions. Giants/trolls/
; animals/creatures lack ActorTypeNPC and are further excluded by -ActorTypeGiant.
; -----------------------------------------------------------------------------
; BEDS (no mess): "Allow Sleeping" is turned OFF on every package EXCEPT three,
; each matching WHO sleeps WHEN:
;   - NORMAL npcs   -> VRAI_FollowerLife_Night + VRAI_Fallback_NightHome (night)
;   - VAMPIRES      -> VRAI_Vampire_DayShelter (they sleep in their lair by DAY)
;   - WEREWOLVES    -> none forced (they don't mind the sun; see below)
; So nobody this mod controls ever naps in a tavern or a random bed while out,
; travelling or on a daytime routine. Each sleep routine anchors on the actor's
; EDITOR location (home/lair) with a tight radius, so an actor who HAS a bed
; there sleeps in their own bed; one without uses a nearby UNOWNED bed or just
; idles - the engine's bed-ownership rules stop them taking anyone else's owned
; bed. NPCs with valid vanilla/quest sleep AI are never touched by this mod, so
; they always use their own bed as normal.
; =============================================================================

; ========================== 1) LIVING ROUTINES (the statue fix) ==============
; The same day/night routine pair is distributed in TWO TIERS:
;   Day (7-19):  roam and live around wherever they are - eat, sit, chat,
;                use idle markers and furniture (radius 2500).
;   Night (19-7): return to their default sandbox spot (editor location) and
;                settle in for the evening; sleeping allowed (radius 600).
; Waiting followers (WaitingForPlayer), guards, hostiles, children, vampires
; and daedra are excluded - the last two have their own routines below.
;
; --- Tier 1: UNRECRUITED FOLLOWERS -> TOP of the stack (index 0) ----------
; Follower-type NPCs (follower/marriage factions, incl. potentials sitting in
; CurrentFollowerFaction at rank -1, and *follower editorIDs) usually have no
; AI or a lazy default sandbox the author never tuned. On TOP the routine beats
; that trash package so they actually LIVE while unrecruited. The moment they
; are actually recruited (GetPlayerTeammate == 1) it stands down and hands full
; control to your follower framework (NFF); it also yields during scenes,
; dialogue, waiting, combat and jail. Uses its OWN packages gated by the
; "Unrecruited follower routines" MCM toggle (global 0x83C), separate from the
; generic tier-2 statue-net below, so you can toggle followers independently.
; (SPID skips duplicate inserts, so tier-1 NPCs are unaffected by tier 2.)
Package = VRAI_FollowerLife_Day|-*slave,-*captive|PotentialFollowerFaction,DismissedFollowerFaction,PotentialMarriageFaction,-ActorTypeCreature,-ActorTypeAnimal,-Vampire,-VampireFaction,-DLC1VampireFaction,-VampireThrallFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|99|100
