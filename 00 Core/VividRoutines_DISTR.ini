; ========================== 15) BANDIT RAIDS -- DEFAULT OFF =================
; Opt-in danger (global VRAI_BanditRaids defaults to 0). When enabled: on two
; evenings a week, ~40% of the exterior-camp bandits WHOSE HOLD they are in
; push out toward a nearby farm to raid it, then fall back. Hold-routed by
; GetInCurrentLoc so bandits never trek across the map. Non-essential farmhands
; CAN die - that is the point, and why it ships OFF. Interior/dungeon bandits,
; named uniques (-U), and anyone in combat/scene/jail are untouched.
Package = VRAI_Raid_WhiterunFarms|NONE|BanditFaction,-ActorTypeCreature,-ActorTypeAnimal,-VRAI_Excluded|NONE|-U|0|40
Package = VRAI_Raid_RiftFarms|NONE|BanditFaction,-ActorTypeCreature,-ActorTypeAnimal,-VRAI_Excluded|NONE|-U|0|40
Package = VRAI_Raid_HaafingarFarms|NONE|BanditFaction,-ActorTypeCreature,-ActorTypeAnimal,-VRAI_Excluded|NONE|-U|0|40


; ========================== 16) CIVIL WAR SORTIES -- DEFAULT OFF ============
; Opt-in danger (global VRAI_CWSkirmish defaults to 0), and it ONLY works while
; the civil war is unfinished (GetStage(CW) < 255); once the war ends every one
; of these packages goes permanently invalid. When enabled: on two afternoons a
; week both armies' exterior-camp soldiers push out to patrol, so Imperial and
; Stormcloak groups collide on the roads (they are already enemies - no forced
; combat, just proximity).
;   COMPATIBILITY: this overlaps in spirit with faction-war mods such as
;   "Stormcloaks Fight With Thalmor and Penitus Oculatus". Because it ships OFF
;   by default there is no conflict unless you deliberately enable it; if you
;   run such a mod, leaving this off is recommended (the MCM says so too).
; Named officers/uniques (-U), interiors, combat, scenes and jail are excluded.
Package = VRAI_CW_CampSortie|NONE|CWImperialFaction,CWSonsFaction,-ActorTypeCreature,-ActorTypeAnimal,-VRAI_Excluded|NONE|-U|0|50


; ========================== 17) WOLF PACKS HUNT PREY ========================
; Vanilla already makes wolves attack deer/goats/elk (PredatorFaction vs
; PreyFaction) - what's missing is MOVEMENT: they idle at their spawn. This adds
; a wide daytime roam (6:00-20:00, 3500u) so wolves actually range their
; territory and cross paths with prey. Nights are left vanilla so herds recover.
; Combat is NOT modified - wolves are no more dangerous to people than vanilla,
; and a habitation-location guard keeps the roam OUT of settlements. Pet/follower
; wolves (GetPlayerTeammate) and quest wolves (scene guards) are excluded.
; Targets wolf-race animals only: *wolf + ActorTypeAnimal (werewolves aren't
; animals; dogs lack "wolf"). MCM: 'Wolf pack hunts'. If wildlife ever feels
; thin, this is the first dial to turn down.
Package = VRAI_Wolf_PackHunt|*wolf|ActorTypeAnimal,-VRAI_Excluded|NONE|NONE|0|100


