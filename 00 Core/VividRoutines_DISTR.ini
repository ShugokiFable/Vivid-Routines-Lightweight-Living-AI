; --- Tier 1b: CITY OUTINGS -> TOP of the stack (index 0) ------------------
; Plain sandboxing never crosses load doors, so tavern/home residents used to
; stay in their cell forever. These packages anchor on an EXTERIOR ref in
; each city (travel-to-anchor does path through doors) and only run for NPCs
; whose current location is that city. On their cohort's outing days
; (10:00-16:00) they step outside and stroll the streets, then drift back.
; NOTE ini order: for index-0 lines, LATER lines sit HIGHER in the stack -
; outings are listed after the day/night pair on purpose, so on outing days
; the stroll wins and on all other days the day/night routine takes over.
