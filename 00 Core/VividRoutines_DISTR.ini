; ========================== 2) VAMPIRE ROUTINES ==============================
; Wild vampires (vanilla + modded, matched by faction OR the Vampire race
; keyword) are strongly nocturnal: they SLEEP in their lair by day (DayShelter
; is the one daytime routine with sleeping ON - they sleep in their own coffin/
; bed or a nearby unowned one) and wander far at night. These sit at the TOP of
; the stack on purpose: nocturnal life overrides generic AI. Excluded: Coldhaven
; citizens (civilized), thralls (mortals), uniques (Serana & quest vampires keep
; their own AI), current followers (GetPlayerTeammate).
Package = VRAI_Vampire_DayShelter|NONE|VampireFaction,DLC1VampireFaction,Vampire,-ActorTypeCreature,-ActorTypeAnimal,-0x097A58~Coldhaven.esm,-VampireThrallFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-U|0|100
Package = VRAI_Vampire_NightWander|NONE|VampireFaction,DLC1VampireFaction,Vampire,-ActorTypeCreature,-ActorTypeAnimal,-0x097A58~Coldhaven.esm,-VampireThrallFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-U|0|100

; 60% of wild vampires become active hunters at night when outdoors:
; a conditioned ability raises Aggression by 1 (capped below frenzy) only
; between 19:00-05:00 outside. They need to feed. MCM: "Vampire Night Hunt".
; v2.13 REMOVED: VRAI_AbNightPredator granted Aggression +1, which pushes an
; 'Aggressive' actor to 'Very Aggressive' = attacks anyone who is not an ally.
; That made distributed vampires (and mod NPCs sharing those factions) start
; fights with townsfolk. This mod does not modify aggression or confidence of
; ordinary NPCs - night behavior is expressed purely through packages.

; 30% of seasoned vampires (level 15+) are marked as Coldhaven pilgrims.
; The rest (70%) keep the plain night-wander package above (it stands down
; automatically for pilgrims via a keyword check). Secretive by design.
Keyword = VRAI_ColdKin|NONE|VampireFaction,DLC1VampireFaction,Vampire,-ActorTypeCreature,-ActorTypeAnimal,-0x097A58~Coldhaven.esm,-VampireThrallFaction,-VRAI_Excluded|15|-U|NONE|30


; ========================== 3) WEREWOLF PROWL ================================
; Werebeasts don't mind the sun, so unlike vampires they do NOT sleep by day -
; they live normally in daylight (via the routines above / their own AI) and
; only LEAN nocturnal: ~60% of them (the chance below) pick up a night prowl
; around their home turf from 20:00; the other ~40% keep fully normal lives and
; sleep at night like anyone else. So werewolves are "a bit less" nocturnal than
; vampires. The prowl carries no sleeping. Companions Circle excluded (they have
; full questline schedules).
Package = VRAI_Werewolf_NightProwl|NONE|WerewolfFaction,-ActorTypeCreature,-CompanionsCircle,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-U|0|60


; ========================== 3b) DAEDRA & DEMONS ==============================
; Daedric and demonic NPCs (matched by the ActorTypeDaedra keyword OR by
; name/editorID for modded demons and succubi) lurk near their lair by day
; and roam wide at night. Bottom of the stack like the living routines, so
; daedric NPCs with author-made AI keep it. Hostile daedra are unaffected
; (runtime condition), so dungeon dremora stay exactly where they belong.
Package = VRAI_Daedra_DayLair|-*slave,-*captive|ActorTypeDaedra,-CollegeofWinterholdFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|99|100
Package = VRAI_Daedra_NightRoam|-*slave,-*captive|ActorTypeDaedra,-CollegeofWinterholdFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|99|100
Package = VRAI_Daedra_DayLair|*dremora,*daedra,*demon,*succub|ActorTypeNPC,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|99|100
Package = VRAI_Daedra_NightRoam|*dremora,*daedra,*demon,*succub|ActorTypeNPC,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|99|100


; ========================== 4) FOES STAY FOES ================================
; Fixes the classic "cowardly enemy flees the fight" oversight WITHOUT editing
; any NPC record: a conditioned ability that lifts Confidence to fighting
; level ONLY while the NPC is hostile to you, is coward/cautious, and is not
; (and can never become) a follower. Cowardly CIVILIANS still flee dragons and
; brawls exactly like vanilla. Cowardly FOLLOWERS keep their courage arc.
; MCM: "Foes Stay Foes" - flip it off and the ability goes inert instantly.
Spell = VRAI_AbFoeResolve|NONE|BanditFaction,WarlockFaction,NecromancerFaction,ForswornFaction,SilverHandFaction,ThalmorFaction,-VRAI_Excluded|NONE|NONE|NONE|100


; ========================== 5) WANDERLUST ====================================
; "The world does not wait for you." Ordinary citizens - vanilla AND modded -
; are split into four travel cohorts (15% chance each). On their cohort's
; weekdays they journey to another hold's tavern and mingle till evening.
; Hard gate: only NPCs carrying VRAI_FreeSpirit qualify, and that keyword is
; handed out by SkyPatcher exclusively to NON-ESSENTIAL, NON-PROTECTED NPCs -
; quest-vital people never leave their marks. Guards, jarls, innkeepers,
; merchants, soldiers, caravans and all hostile factions are excluded here.
Keyword = VRAI_CohortA|-*slave,-*captive|ActorTypeNPC,-ActorTypeGiant,-BanditFaction,-WarlockFaction,-NecromancerFaction,-ForswornFaction,-SilverHandFaction,-ThalmorFaction,-CWImperialFaction,-CWSonsFaction,-VampireFaction,-DLC1VampireFaction,-VampireThrallFaction,-WerewolfFaction,-DraugrFaction,-KhajiitCaravanFaction,-JobJarlFaction,-JobInnkeeperFaction,-JobMerchantFaction,-VRAI_Excluded|NONE|-C|NONE|15
