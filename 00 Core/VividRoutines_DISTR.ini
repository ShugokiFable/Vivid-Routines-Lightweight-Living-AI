Package = VRAI_FollowerLife_Day|*follower,-*slave,-*captive|ActorTypeNPC,-ActorTypeGiant,-Vampire,-VampireFaction,-DLC1VampireFaction,-VampireThrallFaction,-BanditFaction,-WarlockFaction,-NecromancerFaction,-ForswornFaction,-SilverHandFaction,-ThalmorFaction,-CWImperialFaction,-CWSonsFaction,-DraugrFaction,-KhajiitCaravanFaction,-dunPrisonerFaction,-ActorTypePrisoner,-VRAI_Excluded|NONE|-C|0|100
