; =============================================================================
;  Vivid Routines - Lightweight Living AI  |  SkyPatcher rules
; =============================================================================
;  THE FREE SPIRIT GATE
;  SkyPatcher can filter by the essential/protected record flags - something
;  SPID cannot do. Only NPCs that are NEITHER essential NOR protected receive
;  the VRAI_FreeSpirit keyword, and every Wanderlust / Bruma travel package
;  requires that keyword as an engine condition.
;
;  Result: quest-vital and plot-armored NPCs never leave their posts, while
;  ordinary living citizens (vanilla AND modded) are free to roam the world.
;  No NPC record edit ships in any plugin - this is applied at runtime, so it
;  wins no conflicts and needs no patches.
;
;  Excluded factions below (hostiles, armies, caravans, jarls) are a
;  belt-and-suspenders copy of the SPID-side exclusions.
; =============================================================================

filterByKeywords=Skyrim.esm|13794:filterByEssential=false:filterByProtected=false:filterByFactionsExcluded=Skyrim.esm|1BCC0,Skyrim.esm|26724,Skyrim.esm|34B74,Skyrim.esm|43599,Skyrim.esm|AA0A4,Skyrim.esm|39F26,Skyrim.esm|2BF9A,Skyrim.esm|2BF9B,Skyrim.esm|27242,Dawnguard.esm|3376,Skyrim.esm|2EB13,Skyrim.esm|43594,Skyrim.esm|2430D,Skyrim.esm|EB091,Skyrim.esm|50920:keywordsToAdd=VividRoutines.esp|80B

; =============================================================================
;  THE FOLLOWER PASSPORT (v1.2)
;  Follower-type NPCs are almost always essential or protected, so the gate
;  above would forever block them from cross-hold Wanderlust travel - which is
;  why they never left their city. These rules grant VRAI_FreeSpirit to
;  follower-type NPCs REGARDLESS of those flags: being recruitable, they are
;  safe to roam. Combined with the travel cohorts (~60% of followers, two
;  fixed days a week) this gives each follower roughly a 1-in-6 chance on any
;  given day to journey to another hold - and their recruit/wait/combat
;  conditions still pause everything the moment it matters.
;  Rule 1: anyone in a potential-follower / dismissed / marriage faction.
;  Rule 2: NPCs whose editor ID contains "follower" (common in follower mods),
;          humanoid only, hostile factions excluded.
; =============================================================================

filterByFactionsOr=Skyrim.esm|5C84D,Skyrim.esm|5C84C,Skyrim.esm|19809:keywordsToAdd=VividRoutines.esp|80B
filterByEditorIdContainsOr=Follower,follower:filterByKeywords=Skyrim.esm|13794:filterByFactionsExcluded=Skyrim.esm|1BCC0,Skyrim.esm|26724,Skyrim.esm|34B74,Skyrim.esm|43599,Skyrim.esm|AA0A4,Skyrim.esm|39F26,Skyrim.esm|2BF9A,Skyrim.esm|2BF9B,Skyrim.esm|27242,Dawnguard.esm|3376,Skyrim.esm|2EB13,Skyrim.esm|2430D:keywordsToAdd=VividRoutines.esp|80B
